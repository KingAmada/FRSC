<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plate Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen">
    <main class="max-w-4xl mx-auto p-6 md:p-12">
        <!-- Input & Verification Section -->
        <div id="lookupSection" class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8 mb-12">
            <div class="mb-8 text-center">
                <h2 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">Plate Verification</h2>
            </div>
            <div class="max-w-xl mx-auto space-y-6">
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase mb-2 tracking-wider">Vehicle Plate Number</label>
                    <div class="flex shadow-lg rounded-2xl overflow-hidden border border-gray-100">
                        <div class="bg-gray-100 px-4 flex items-center border-r border-gray-200">
                            <i class="fa fa-car text-gray-400"></i>
                        </div>
                        <input type="text" id="plateNumber" placeholder="KUJ823BW" class="flex-1 px-4 py-4 outline-none uppercase font-mono font-bold text-lg">
                        <button onclick="performLookup()" id="verifyBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 font-black uppercase text-xs tracking-widest transition-colors">
                            <span id="btnText">Verify</span>
                            <i id="loadingSpinner" class="fa fa-spinner fa-spin hidden"></i>
                        </button>
                    </div>
                    <!-- Error Message -->
                    <div id="errorMsg" class="hidden mt-4 p-4 rounded-xl bg-red-50 border border-red-100 text-red-600 text-xs font-bold flex items-center">
                        <i class="fa fa-exclamation-triangle mr-2"></i>
                        <span id="errorText">Plate not found.</span>
                    </div>
                </div>
                <!-- Vehicle Details -->
                <div id="vehicleDetails" class="hidden animate-in fade-in slide-in-from-top-4 duration-500 mt-6 p-4 bg-gray-50 rounded-2xl">
                    <h3 class="text-sm font-black text-gray-800 uppercase mb-4">Vehicle Details</h3>
                    <div class="space-y-2 text-sm">
                        <p><span class="font-bold">Plate:</span> <span id="detPlate"></span></p>
                        <p><span class="font-bold">Make & Model:</span> <span id="detMake"></span></p>
                        <p><span class="font-bold">Color:</span> <span id="detColor"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        let activeVehicle = null;
        async function performLookup() {
            const rawInput = document.getElementById('plateNumber').value.trim();
            const plateNo = rawInput.toUpperCase().replace(/[-\s]/g, "");
           
            const btn = document.getElementById('verifyBtn');
            const spinner = document.getElementById('loadingSpinner');
            const text = document.getElementById('btnText');
            const errorDiv = document.getElementById('errorMsg');
            const detailsDiv = document.getElementById('vehicleDetails');
            errorDiv.classList.add('hidden');
            detailsDiv.classList.add('hidden');
            if(!plateNo || plateNo.length < 5) {
                showError("Please enter a valid plate number.");
                return;
            }
            btn.disabled = true;
            spinner.classList.remove('hidden');
            text.classList.add('hidden');
            try {
                // First, fetch the form page to get the anti-forgery token
                const formUrl = 'https://nvis.frsc.gov.ng/vehiclemanagement/verifyplateno';
                const formResponse = await fetch(formUrl);
                if (!formResponse.ok) {
                    throw new Error(`Failed to fetch form page: ${formResponse.statusText}`);
                }
                const formHtml = await formResponse.text();
                const parser = new DOMParser();
                const formDoc = parser.parseFromString(formHtml, 'text/html');
                const tokenInput = formDoc.querySelector('input[name="__RequestVerificationToken"]');
                if (!tokenInput) {
                    throw new Error('Anti-forgery token not found in form page.');
                }
                const token = tokenInput.value;

                // Now, perform the POST request with the token and plate number
                const postUrl = 'https://nvis.frsc.gov.ng/vehiclemanagement/VerifyPlateNo';
                const formData = new FormData();
                formData.append('plateNumber', plateNo);
                formData.append('__RequestVerificationToken', token);

                const postResponse = await fetch(postUrl, {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'  // Include cookies if needed (may require same-origin)
                });
                if (!postResponse.ok) {
                    throw new Error(`Verification failed: ${postResponse.statusText}`);
                }
                const resultHtml = await postResponse.text();
                const resultDoc = parser.parseFromString(resultHtml, 'text/html');

                // Parse the result for vehicle details
                const panelHeading = resultDoc.querySelector('.panel-heading');
                if (!panelHeading || !panelHeading.textContent.includes('Valid')) {
                    throw new Error('Plate not found or invalid.');
                }
                const makeTd = resultDoc.querySelector('table tr:nth-child(1) td:nth-child(2) span');
                const colorTd = resultDoc.querySelector('table tr:nth-child(2) td:nth-child(2) span');

                if (!makeTd || !colorTd) {
                    throw new Error('Vehicle details not found in response.');
                }

                activeVehicle = {
                    plate: plateNo,
                    make: makeTd.textContent.trim(),
                    color: colorTd.textContent.trim()
                };

                document.getElementById('detPlate').innerText = activeVehicle.plate;
                document.getElementById('detMake').innerText = activeVehicle.make;
                document.getElementById('detColor').innerText = activeVehicle.color;
                detailsDiv.classList.remove('hidden');
                detailsDiv.scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                showError(err.message || "Unable to find record.");
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
                text.classList.remove('hidden');
            }
        }
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            document.getElementById('errorText').innerText = msg;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
