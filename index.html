<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plate Verification Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen">
    <main class="max-w-4xl mx-auto p-6 md:p-12">
        <!-- Input & Verification Section -->
        <div id="lookupSection" class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8 mb-12">
            <div class="mb-8 text-center">
                <h2 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">Vehicle Plate Verification</h2>
                <p class="text-sm text-gray-500 mt-2">Enter a Nigerian vehicle plate number to look up details.</p>
            </div>
            <div class="max-w-xl mx-auto space-y-6">
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase mb-2 tracking-wider">Vehicle Plate Number</label>
                    <div class="flex shadow-lg rounded-2xl overflow-hidden border border-gray-100">
                        <div class="bg-gray-100 px-4 flex items-center border-r border-gray-200">
                            <i class="fa fa-car text-gray-400"></i>
                        </div>
                        <input type="text" id="plateNumber" placeholder="KUJ575EP" class="flex-1 px-4 py-4 outline-none uppercase font-mono font-bold text-lg">
                        <button onclick="performLookup()" id="verifyBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 font-black uppercase text-xs tracking-widest transition-colors">
                            <span id="btnText">Verify</span>
                            <i id="loadingSpinner" class="fa fa-spinner fa-spin hidden"></i>
                        </button>
                    </div>
                    <!-- Error Message -->
                    <div id="errorMsg" class="hidden mt-4 p-4 rounded-xl bg-red-50 border border-red-100 text-red-600 text-xs font-bold flex items-center">
                        <i class="fa fa-exclamation-triangle mr-2"></i>
                        <span id="errorText">Plate not found.</span>
                    </div>
                </div>
                <!-- Vehicle Details -->
                <div id="vehicleDetails" class="hidden animate-in fade-in slide-in-from-top-4 duration-500 mt-6 p-4 bg-gray-50 rounded-2xl">
                    <h3 class="text-sm font-black text-gray-800 uppercase mb-4">Vehicle Details</h3>
                    <div class="space-y-2 text-sm">
                        <p><span class="font-bold">Plate:</span> <span id="detPlate"></span></p>
                        <p><span class="font-bold">Make:</span> <span id="detMake"></span></p>
                        <p><span class="font-bold">Model:</span> <span id="detModel"></span></p>
                        <p><span class="font-bold">Type:</span> <span id="detType"></span></p>
                        <p><span class="font-bold">Color:</span> <span id="detColor"></span></p>
                        <p><span class="font-bold">Status:</span> <span id="detStatus"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        let activeVehicle = null;
        async function performLookup() {
            const rawInput = document.getElementById('plateNumber').value.trim();
            const plateNo = rawInput.toUpperCase().replace(/[-\s]/g, "");
           
            const btn = document.getElementById('verifyBtn');
            const spinner = document.getElementById('loadingSpinner');
            const text = document.getElementById('btnText');
            const errorDiv = document.getElementById('errorMsg');
            const detailsDiv = document.getElementById('vehicleDetails');
            errorDiv.classList.add('hidden');
            detailsDiv.classList.add('hidden');
            if(!plateNo || plateNo.length < 5) {
                showError("Please enter a valid plate number (e.g., KUJ575EP).");
                return;
            }
            btn.disabled = true;
            spinner.classList.remove('hidden');
            text.classList.add('hidden');
            try {
                // Use cors-anywhere proxy to bypass CORS
                // IMPORTANT: Visit https://cors-anywhere.herokuapp.com/corsdemo FIRST to request temporary access!
                // This proxy requires manual activation for your browser session.
                const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
                
                // Perform the POST request
                const postUrl = proxyUrl + 'https://selfservice.fctevreg.com/router.php';
                const formData = new FormData();
                formData.append('op', 'SelfServiceResource.getVehicleDocument');
                formData.append('handler', 'SelfServiceResource');
                formData.append('verify', 'number_plate');
                formData.append('plate_no', plateNo);
                formData.append('type', 'genuine');  // Change to 'valid', 'roadWorthy', or 'insurance' as needed

                const postResponse = await fetch(postUrl, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'  // Required for cors-anywhere
                    }
                });
                if (!postResponse.ok) {
                    throw new Error(`Verification failed: ${postResponse.statusText}. Check proxy activation.`);
                }
                const resultJson = await postResponse.json();

                // Parse the JSON response
                if (resultJson.status !== 102 || resultJson.Genuine !== 'GENUINE') {
                    throw new Error('Plate not found or invalid.');
                }

                activeVehicle = {
                    plate: plateNo,
                    make: resultJson.Make || 'N/A',
                    model: resultJson.Model || 'N/A',
                    type: resultJson.Type || 'N/A',
                    color: resultJson.Colour || 'N/A',
                    status: resultJson.Genuine
                };

                document.getElementById('detPlate').innerText = activeVehicle.plate;
                document.getElementById('detMake').innerText = activeVehicle.make;
                document.getElementById('detModel').innerText = activeVehicle.model;
                document.getElementById('detType').innerText = activeVehicle.type;
                document.getElementById('detColor').innerText = activeVehicle.color;
                document.getElementById('detStatus').innerText = activeVehicle.status;
                detailsDiv.classList.remove('hidden');
                detailsDiv.scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                showError(err.message || "Unable to retrieve record. Check console for details and ensure proxy is activated.");
                console.error(err);
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
                text.classList.remove('hidden');
            }
        }
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            document.getElementById('errorText').innerText = msg;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
