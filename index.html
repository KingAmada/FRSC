<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Plate Verification Tool (FRSC & DRTS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen">
    <main class="max-w-4xl mx-auto p-6 md:p-12">
        <!-- Input & Verification Section -->
        <div id="lookupSection" class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8 mb-12">
            <div class="mb-8 text-center">
                <h2 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">Integrated Vehicle Plate Verification (FRSC & DRTS)</h2>
                <p class="text-sm text-gray-500 mt-2">Enter a Nigerian vehicle plate number to look up details from both FRSC and DRTS.</p>
            </div>
            <div class="max-w-xl mx-auto space-y-6">
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase mb-2 tracking-wider">Vehicle Plate Number</label>
                    <div class="flex shadow-lg rounded-2xl overflow-hidden border border-gray-100">
                        <div class="bg-gray-100 px-4 flex items-center border-r border-gray-200">
                            <i class="fa fa-car text-gray-400"></i>
                        </div>
                        <input type="text" id="plateNumber" placeholder="KUJ575EP" class="flex-1 px-4 py-4 outline-none uppercase font-mono font-bold text-lg">
                        <button onclick="performLookup()" id="verifyBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 font-black uppercase text-xs tracking-widest transition-colors">
                            <span id="btnText">Verify</span>
                            <i id="loadingSpinner" class="fa fa-spinner fa-spin hidden"></i>
                        </button>
                    </div>
                    <!-- Error Message -->
                    <div id="errorMsg" class="hidden mt-4 p-4 rounded-xl bg-red-50 border border-red-100 text-red-600 text-xs font-bold flex items-center">
                        <i class="fa fa-exclamation-triangle mr-2"></i>
                        <span id="errorText">Plate not found.</span>
                    </div>
                </div>
                <!-- Vehicle Details -->
                <div id="vehicleDetails" class="hidden animate-in fade-in slide-in-from-top-4 duration-500 mt-6 p-4 bg-gray-50 rounded-2xl">
                    <h3 class="text-sm font-black text-gray-800 uppercase mb-4">Integrated Vehicle Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="p-4 bg-white rounded-lg shadow">
                            <h4 class="text-xs font-bold uppercase text-blue-600 mb-2">FRSC Details</h4>
                            <div id="frscDetails" class="space-y-2 text-sm"></div>
                        </div>
                        <div class="p-4 bg-white rounded-lg shadow">
                            <h4 class="text-xs font-bold uppercase text-green-600 mb-2">DRTS Details</h4>
                            <div id="drtsDetails" class="space-y-2 text-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        let activeVehicle = null;
        async function performLookup() {
            const rawInput = document.getElementById('plateNumber').value.trim();
            const plateNo = rawInput.toUpperCase().replace(/[-\s]/g, "");
           
            const btn = document.getElementById('verifyBtn');
            const spinner = document.getElementById('loadingSpinner');
            const text = document.getElementById('btnText');
            const errorDiv = document.getElementById('errorMsg');
            const detailsDiv = document.getElementById('vehicleDetails');
            errorDiv.classList.add('hidden');
            detailsDiv.classList.add('hidden');
            if(!plateNo || plateNo.length < 5) {
                showError("Please enter a valid plate number (e.g., KUJ575EP).");
                return;
            }
            btn.disabled = true;
            spinner.classList.remove('hidden');
            text.classList.add('hidden');

            let frscData = {};
            let drtsData = {};
            let errors = [];

            try {
                // Use cors-anywhere proxy to bypass CORS
                // IMPORTANT: Visit https://cors-anywhere.herokuapp.com/corsdemo FIRST to request temporary access!
                const proxyUrl = 'https://cors-anywhere.herokuapp.com/';

                // DRTS API Integration (JSON-based)
                try {
                    const drtsPostUrl = proxyUrl + 'https://selfservice.fctevreg.com/router.php';
                    const drtsFormData = new FormData();
                    drtsFormData.append('op', 'SelfServiceResource.getVehicleDocument');
                    drtsFormData.append('handler', 'SelfServiceResource');
                    drtsFormData.append('verify', 'number_plate');
                    drtsFormData.append('plate_no', plateNo);
                    drtsFormData.append('type', 'genuine');  // Using 'genuine' as per example

                    const drtsResponse = await fetch(drtsPostUrl, {
                        method: 'POST',
                        body: drtsFormData,
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });
                    if (!drtsResponse.ok) {
                        throw new Error(`DRTS Verification failed: ${drtsResponse.statusText}`);
                    }
                    const drtsJson = await drtsResponse.json();

                    if (drtsJson.status !== 102 || drtsJson.Genuine !== 'GENUINE') {
                        throw new Error('DRTS: Plate not found or invalid.');
                    }

                    drtsData = {
                        plate: plateNo,
                        make: drtsJson.Make || 'N/A',
                        model: drtsJson.Model || 'N/A',
                        type: drtsJson.Type || 'N/A',
                        color: drtsJson.Colour || 'N/A',
                        status: drtsJson.Genuine
                    };
                } catch (drtsErr) {
                    errors.push(`DRTS Error: ${drtsErr.message}`);
                }

                // FRSC API Integration (HTML scraping)
                try {
                    // Fetch the form page to get the anti-forgery token
                    const frscFormUrl = proxyUrl + 'https://nvis.frsc.gov.ng/vehiclemanagement/verifyplateno';
                    const frscFormResponse = await fetch(frscFormUrl, {
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });
                    if (!frscFormResponse.ok) {
                        throw new Error(`FRSC Failed to fetch form page: ${frscFormResponse.statusText}`);
                    }
                    const frscFormHtml = await frscFormResponse.text();
                    const parser = new DOMParser();
                    const frscFormDoc = parser.parseFromString(frscFormHtml, 'text/html');
                    const tokenInput = frscFormDoc.querySelector('input[name="__RequestVerificationToken"]');
                    if (!tokenInput) {
                        throw new Error('FRSC Anti-forgery token not found.');
                    }
                    const token = tokenInput.value;

                    // Now, perform the POST request
                    const frscPostUrl = proxyUrl + 'https://nvis.frsc.gov.ng/vehiclemanagement/VerifyPlateNo';
                    const frscFormData = new FormData();
                    frscFormData.append('plateNumber', plateNo);
                    frscFormData.append('__RequestVerificationToken', token);

                    const frscPostResponse = await fetch(frscPostUrl, {
                        method: 'POST',
                        body: frscFormData,
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });
                    if (!frscPostResponse.ok) {
                        throw new Error(`FRSC Verification failed: ${frscPostResponse.statusText}`);
                    }
                    const frscResultHtml = await frscPostResponse.text();
                    const frscResultDoc = parser.parseFromString(frscResultHtml, 'text/html');

                    // Parse the result
                    const panelHeading = frscResultDoc.querySelector('.panel-heading');
                    if (!panelHeading || !panelHeading.textContent.includes('Valid')) {
                        throw new Error('FRSC: Plate not found or invalid.');
                    }
                    const makeTd = frscResultDoc.querySelector('table tr:nth-child(1) td:nth-child(2) span');
                    const colorTd = frscResultDoc.querySelector('table tr:nth-child(2) td:nth-child(2) span');

                    if (!makeTd || !colorTd) {
                        throw new Error('FRSC: Vehicle details not found in response.');
                    }

                    frscData = {
                        plate: plateNo,
                        make: makeTd.textContent.trim().split(' ')[0] || 'N/A',  // e.g., DONGFENG
                        model: makeTd.textContent.trim().split(' ')[1] || 'N/A',  // e.g., AEOLUS
                        color: colorTd.textContent.trim() || 'N/A',
                        status: panelHeading.textContent.trim()
                    };
                } catch (frscErr) {
                    errors.push(`FRSC Error: ${frscErr.message}`);
                }

                // If both failed, throw error
                if (Object.keys(frscData).length === 0 && Object.keys(drtsData).length === 0) {
                    throw new Error('No data retrieved from either FRSC or DRTS.');
                }

                // Display integrated details
                const frscHtml = `
                    <p><span class="font-bold">Plate:</span> ${frscData.plate || 'N/A'}</p>
                    <p><span class="font-bold">Make:</span> ${frscData.make || 'N/A'}</p>
                    <p><span class="font-bold">Model:</span> ${frscData.model || 'N/A'}</p>
                    <p><span class="font-bold">Color:</span> ${frscData.color || 'N/A'}</p>
                    <p><span class="font-bold">Status:</span> ${frscData.status || 'N/A'}</p>
                `;
                document.getElementById('frscDetails').innerHTML = frscHtml;

                const drtsHtml = `
                    <p><span class="font-bold">Plate:</span> ${drtsData.plate || 'N/A'}</p>
                    <p><span class="font-bold">Make:</span> ${drtsData.make || 'N/A'}</p>
                    <p><span class="font-bold">Model:</span> ${drtsData.model || 'N/A'}</p>
                    <p><span class="font-bold">Type:</span> ${drtsData.type || 'N/A'}</p>
                    <p><span class="font-bold">Color:</span> ${drtsData.color || 'N/A'}</p>
                    <p><span class="font-bold">Status:</span> ${drtsData.status || 'N/A'}</p>
                `;
                document.getElementById('drtsDetails').innerHTML = drtsHtml;

                detailsDiv.classList.remove('hidden');
                detailsDiv.scrollIntoView({ behavior: 'smooth' });

                if (errors.length > 0) {
                    showError(errors.join(' | '));
                }
            } catch (err) {
                showError(err.message || "Unable to retrieve record. Check console for details and ensure proxy is activated.");
                console.error(err);
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
                text.classList.remove('hidden');
            }
        }
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            document.getElementById('errorText').innerText = msg;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
